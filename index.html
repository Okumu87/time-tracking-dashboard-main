<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <!-- google fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
<link rel="stylesheet" href="styles.css">
  
  <title>Frontend Mentor | Time tracking dashboard</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
</head>
<body>


    <!-- activities -->
    <div class="activities">
      <div class="profile">
      <div class="profile__details">
        <img src="./images/image-jeremy.png" alt="Jeremy Robson's profile picture" class="profile__picture">
        <div class="profile__info">
          <p class="profile__report">Report for</p>
          <h1 class="profile__name">Jeremy <br>Robson</h1>
        </div>
      </div>

      <nav class="profile__nav">
        <ul>
          <li>
            <button type="button" class=" nav-btn ">Daily</button></li>
          <li><button type="button" class="nav-btn active">Weekly</button></li>
          <li><button type="button" class="nav-btn">Monthly</button></li>
        </ul>
      </nav>
    </div>
    <!-- activity cards -->

    <!-- work  -->
      <div class="activity">
        <div class="activity-icon icon-work">
          <img src="./images/icon-work.svg" alt="Work icon">
        </div>
      
        <div class="activity__header">
          <h2 class="activity__title">Work</h2>
          <img src="./images/icon-ellipsis.svg" alt="Options" class="activity__options">
        </div>
        <div class="activity__body">
          <p class="activity__current">33hrs</p>
          <p class="activity__previous">Previous - 7hrs</p>
        </div>
      </div>  

      <!-- play -->
      <div class="activity">
        <div class="activity-icon icon-play">
          <img src="./images/icon-play.svg" alt="Play icon">
        </div>
            <div class="activity__header">
              <h2 class="activity__title">Play</h2>
              <img src="./images/icon-ellipsis.svg" alt="Options" class="activity__options">
            </div>
            <div class="activity__body">
              <p class="activity__current">1hr</p>
              <p class="activity__previous">Previous - 2hrs</p>
            </div>
      </div>

      <!-- study -->
      <div class="activity">
        <div class="activity-icon icon-study">
          <img src="./images/icon-study.svg" alt="Study icon">
        </div>
        <div class="activity__header">
          <h2 class="activity__title">Study</h2>
          <img src="./images/icon-ellipsis.svg" alt="Options" class="activity__options">
        </div>
        <div class="activity__body">
          <p class="activity__current">0hrs</p>
          <p class="activity__previous">Previous - 1hr</p>
        </div>
      </div>

      <!-- exercise -->
      <div class="activity">
        <div class="activity-icon icon-exercise">
          <img src="./images/icon-exercise.svg" alt="Exercise icon">
        </div>
        <div class="activity__header">
          <h2 class="activity__title">Exercise</h2>
          <img src="./images/icon-ellipsis.svg" alt="Options" class="activity__options">
        </div>
        <div class="activity__body">
          <p class="activity__current">1hr</p>
          <p class="activity__previous">Previous - 1hr</p>
        </div>
      </div>

      <!-- social -->
      <div class="activity">
        <div class="activity-icon icon-social">
          <img src="./images/icon-social.svg" alt="Social icon">
        </div>
        <div class="activity__header">
          <h2 class="activity__title">Social</h2>
          <img src="./images/icon-ellipsis.svg" alt="Options" class="activity__options">
        </div>
        <div class="activity__body">
          <p class="activity__current">1hr</p>
          <p class="activity__previous">Previous - 3hrs</p>
        </div>
      </div>

      <!-- self care -->
      <div class="activity">
        <div class="activity-icon icon-self-care">
          <img src="./images/icon-self-care.svg" alt="Self Care icon">
        </div>
        <div class="activity__header">
          <h2 class="activity__title">Self Care</h2>
          <img src="./images/icon-ellipsis.svg" alt="Options" class="activity__options">
        </div>
        <div class="activity__body">
          <p class="activity__current">0hrs</p>
          <p class="activity__previous">Previous - 1hr</p>
        </div>
      </div>
    </div>
    <!-- end activities --> 


 
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Christopher</a>.
  </footer>
  <script src="script.js"></script>
</body>
</html>
